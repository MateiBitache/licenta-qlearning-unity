<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="820" height="420" fill="#ffffff"/>
  <text x="410" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a2e">Agent - Environment Interaction</text>

  <rect x="80" y="150" width="240" height="120" rx="14" fill="#dceaf7" stroke="#2b5d8c" stroke-width="2.5"/>
  <text x="200" y="200" text-anchor="middle" font-size="26" font-weight="700" fill="#1a3a5c">Agent</text>
  <text x="200" y="232" text-anchor="middle" font-size="15" fill="#33536e">Q-table policy</text>

  <rect x="500" y="150" width="240" height="120" rx="14" fill="#e3f3e1" stroke="#2f7d36" stroke-width="2.5"/>
  <text x="620" y="200" text-anchor="middle" font-size="26" font-weight="700" fill="#1f5a26">Environment</text>
  <text x="620" y="232" text-anchor="middle" font-size="15" fill="#37663d">8 x 8 grid</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <path d="M320,185 L500,185" fill="none" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="410" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#222">action a (up/down/left/right)</text>

  <path d="M500,240 L320,240" fill="none" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="410" y="262" text-anchor="middle" font-size="16" font-weight="600" fill="#222">state s', reward r</text>

  <rect x="250" y="320" width="320" height="60" rx="10" fill="#fbf3da" stroke="#b8901f" stroke-width="2"/>
  <text x="410" y="346" text-anchor="middle" font-size="15" fill="#5e4a12">reward: +1 goal, -1 trap,</text>
  <text x="410" y="367" text-anchor="middle" font-size="15" fill="#5e4a12">-0.01 per step, -0.1 hitting a wall</text>
</svg>
